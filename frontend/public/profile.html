<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - ML compiler</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <nav class="custom-navbar"></nav>
  <main style="padding:40px;">
    <div style="max-width:720px;margin:0 auto;color:var(--text-primary);">
      <h1 id="profileName">Profile</h1>
      <div class="profile-card" style="background:rgba(255,255,255,0.03);padding:18px;border-radius:12px;">
        <p id="profileRole" style="margin:6px 0;color:var(--text-muted);"></p>
        <p id="profileEmail" style="margin:6px 0;color:var(--text-muted);"></p>
        <div style="margin-top:12px;display:flex;gap:12px;">
          <a href="/" class="btn-signin">Home</a>
          <button id="btnEditProfile" class="btn-signup">Edit Profile</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const name = localStorage.getItem('userName') || 'User';
    const role = (localStorage.getItem('userRole') || 'student').toUpperCase();
    document.getElementById('profileName').innerText = name;
    document.getElementById('profileRole').innerText = role + ' SYSTEM';
    document.getElementById('profileEmail').innerText = '';

    document.getElementById('btnEditProfile').addEventListener('click', () => {
      alert('Profile edit not implemented yet.');
    });
  </script>

  <script src="/js/navbar.js"></script>
</body>
</html>
