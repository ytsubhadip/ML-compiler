<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <link rel="icon" type="image/png" href="../asset/magento-brands-solid-full.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="codemirror-5.65.21/lib/codemirror.css">
    <script src="codemirror-5.65.21/lib/codemirror.js"></script>
    <script src="codemirror-5.65.21/mode/clike/clike.js"></script>
    <link rel="stylesheet" href="codemirror-5.65.21/theme/darcula.css">
    <link rel="stylesheet" href="codemirror-5.65.21/theme/night.css">
    <script src="codemirror-5.65.21/addon/edit/closebrackets.js"></script>
    <script src="codemirror-5.65.21/mode/python/python.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <div class="matrix-loader-overlay" id="globalPageLoader">
      <div class="spinner">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
      </div>
      <div class="loader-status-msg" id="globalLoaderText">Syncing Environment...</div>
  </div>

  <nav class="custom-navbar">
    <div class="nav-container">
      <a class="nav-brand" href="/">
        <i class="fa-brands fa-magento nav-logo"></i>
        <span class="nav-title">ML compiler</span>
      </a>
      
      <div class="nav-menu-wrapper" id="navMenuWrapper">
        <ul class="nav-menu" id="dynamicNavLinks">
          <li><a href="/" class="nav-link" id="navHome">Home</a></li>
          <li><a href="/playground" class="nav-link" id="navPlayground">playground</a></li>
          </ul>
        <div class="nav-actions-mobile" id="dynamicMobileActions">
          </div>
      </div>
      
      <div class="nav-actions" id="dynamicDesktopActions">
          </div>
      
      <button class="nav-toggle" id="navToggle" aria-label="Toggle Navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
  </body>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const pageLoader = document.getElementById("globalPageLoader");
        const loaderText = document.getElementById("globalLoaderText");

        if (pageLoader) {
          
            setTimeout(() => {
                pageLoader.classList.remove("active");
            }, 300);
        }

      
        document.addEventListener("click", function(e) {
            const anchor = e.target.closest("a");
            if (!anchor) return;

            const targetURL = anchor.getAttribute("href");
            
           
            if (!targetURL || targetURL.startsWith("#") || targetURL.startsWith("javascript:") || anchor.getAttribute("target") === "_blank") {
                return;
            }

            if (pageLoader) {
                e.preventDefault(); 
                if (loaderText) loaderText.innerText = "Compiling Next Module...";
                pageLoader.classList.add("active"); 
                
                setTimeout(() => {
                    window.location.href = targetURL;
                }, 400);
            }
        });

        
        const token = localStorage.getItem("authToken");
        const role = localStorage.getItem("userRole") || "student";
        const name = localStorage.getItem("userName") || "User";
        const currentPath = window.location.pathname;

        const linksContainer = document.getElementById("dynamicNavLinks");
        const desktopActions = document.getElementById("dynamicDesktopActions");
        const mobileActions = document.getElementById("dynamicMobileActions");

       
        if (currentPath === "/" || currentPath === "/index.html") {
            document.getElementById("navHome")?.classList.add("active");
        } else if (currentPath === "/playground") {
            document.getElementById("navPlayground")?.classList.add("active");
        }

       
        const targetLi = document.createElement("li");
        if (token) {
            if (role.toLowerCase() === "teacher") {
              
                targetLi.innerHTML = `<a href="/create-test" class="nav-link ${currentPath === '/create-test' ? 'active' : ''}">Create Test</a>`;
            } else {
                
                targetLi.innerHTML = `<a href="/ide" class="nav-link ${currentPath === '/ide' ? 'active' : ''}">coding Test</a>`;
            }
        } else {
            
            targetLi.innerHTML = `<a href="/ide" class="nav-link ${currentPath === '/ide' ? 'active' : ''}">coding Test</a>`;
        }
        if (linksContainer) linksContainer.appendChild(targetLi);

        if (token) {
            const userInitial = name.trim().charAt(0).toUpperCase();
            const profileMenuMarkup = `
                <div class="user-profile-menu">
                    <div class="profile-avatar-trigger" id="profileTrigger">
                        <div class="avatar-circle">${userInitial}</div>
                    </div>
                    <div class="profile-dropdown-card" id="profileDropdown">
                        <div class="dropdown-header">
                            <h6>${name}</h6>
                            <span class="user-role-badge">${role.toUpperCase()} ACCESS</span>
                        </div>
                        <hr class="dropdown-divider">
                        <button class="dropdown-logout-btn" id="btnLogoutAction">
                            <i class="bi bi-box-arrow-left"></i> Log Out
                        </button>
                    </div>
                </div>
            `;
            
            if (desktopActions) desktopActions.innerHTML = profileMenuMarkup;
            if (mobileActions) mobileActions.innerHTML = profileMenuMarkup;

            
            const trigger = document.getElementById("profileTrigger");
            const dropdown = document.getElementById("profileDropdown");
            if (trigger && dropdown) {
                trigger.addEventListener("click", function(e) {
                    e.stopPropagation();
                    dropdown.classList.toggle("show");
                });
                document.addEventListener("click", () => dropdown.classList.remove("show"));
            }

           
            const logoutBtn = document.getElementById("btnLogoutAction");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", function() {
                    if (pageLoader && loaderText) {
                        loaderText.innerText = "De-allocating Session Memory...";
                        pageLoader.classList.add("active");
                    }
                    setTimeout(() => {
                        localStorage.clear();
                        window.location.href = "/signin";
                    }, 600);
                });
            }

        } else {
            // Unauthenticated state buttons template
            const loginButtons = `
                <a href="/signin" class="btn-signin">Sign In</a>
                <a href="/signup" class="btn-signup">Sign Up</a>
            `;
            if (desktopActions) desktopActions.innerHTML = loginButtons;
            if (mobileActions) mobileActions.innerHTML = loginButtons;
        }

        
        const navToggle = document.getElementById('navToggle');
        const navMenuWrapper = document.getElementById('navMenuWrapper');
        
        if (navToggle && navMenuWrapper) {
            navToggle.addEventListener('click', function() {
                navToggle.classList.toggle('active');
                navMenuWrapper.classList.toggle('active');
            });
        }
    });
</script>
</html>
