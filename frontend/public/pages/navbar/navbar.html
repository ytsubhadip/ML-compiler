        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Embedded Styles to ensure immediate override cascade priority */
        /* Loader styles removed to avoid injecting a global overlay. */
        .user-profile-menu { position: relative; display: inline-block; }
        .profile-avatar-trigger { cursor: pointer; border-radius: 50%; padding: 2px; background: linear-gradient(135deg, #2ec866, #3b82f6); box-shadow: 0 0 12px rgba(46, 200, 102, 0.3); transition: transform 0.2s ease; }
        .profile-avatar-trigger:hover { transform: scale(1.05); }
        .avatar-circle { width: 38px; height: 38px; background: #16181d; border-radius: 50%; color: #ffffff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Outfit', sans-serif; font-size: 1.1rem; }
        .profile-dropdown-card { position: absolute; top: 55px; right: 0; width: 240px; background: rgba(22, 24, 29, 0.98); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 16px; display: none; z-index: 100000; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px); }
        .profile-dropdown-card.show { display: block; animation: dropdownSlideEffect 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .dropdown-header h6 { color: #ffffff; margin: 0 0 4px 0; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1rem; text-align: left; }
        .user-role-badge { font-size: 0.75rem; background: rgba(59, 130, 246, 0.15); color: #3b82f6; padding: 2px 8px; border-radius: 6px; font-family: 'Rubik', sans-serif; font-weight: 500; }
        .dropdown-divider { border-top: 1px solid rgba(255, 255, 255, 0.08); margin: 12px 0; }
        .dropdown-logout-btn { width: 100%; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 12px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        @keyframes dropdownSlideEffect { 0% { opacity: 0; transform: translateY(-12px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

  <!-- global loader markup removed -->

  <nav class="custom-navbar">
    <div class="nav-container">
      <a class="nav-brand" href="/">
        <i class="fa-brands fa-magento nav-logo"></i>
        <span class="nav-title">ML compiler</span>
      </a>
      
      <div class="nav-menu-wrapper" id="navMenuWrapper">
        <ul class="nav-menu" id="dynamicNavLinks">
          <li><a href="/" class="nav-link" id="navHome">Home</a></li>
          <li><a href="/playground" class="nav-link" id="navPlayground">playground</a></li>
          </ul>
        <div class="nav-actions-mobile" id="dynamicMobileActions"></div>
      </div>
      
      <div class="nav-actions" id="dynamicDesktopActions"></div>
      
      <button class="nav-toggle" id="navToggle" aria-label="Toggle Navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
  </body>

<script>
    // 🟢 FORCE IMMEDIATE AUTH LOGIC TO RUN LIVE WITHOUT WAITING FOR DOM LOAD
    (function () {
        // Loader elements removed; no global overlay used.

        // Global loader behavior removed: links redirect normally without overlay.

        // Parse memory session parameters
        const token = localStorage.getItem("authToken");
        const role = localStorage.getItem("userRole") || "student";
        const name = localStorage.getItem("userName") || "User";
        const currentPath = window.location.pathname;

        const linksContainer = document.getElementById("dynamicNavLinks");
        const desktopActions = document.getElementById("dynamicDesktopActions");
        const mobileActions = document.getElementById("dynamicMobileActions");

        // Set highlight states based on current path coordinates
        if (currentPath === "/" || currentPath === "/index.html") {
            document.getElementById("navHome")?.classList.add("active");
        } else if (currentPath === "/playground") {
            document.getElementById("navPlayground")?.classList.add("active");
        }

        // Inject path tabs conditionally based on user role
        if (linksContainer) {
            let roleTabHTML = "";
            if (token && role.trim().toLowerCase() === "teacher") {
                roleTabHTML = `<li><a href="/create-test" class="nav-link ${currentPath === '/create-test' ? 'active' : ''}">Create Test</a></li>`;
            } else {
                roleTabHTML = `<li><a href="/ide" class="nav-link ${currentPath === '/ide' ? 'active' : ''}">coding Test</a></li>`;
            }
            linksContainer.insertAdjacentHTML("beforeend", roleTabHTML);
        }

        // Swap out access buttons if an active token is detected
        if (token) {
            const avatarChar = name.trim().charAt(0).toUpperCase();
            const dropdownMarkup = `
                <div class="user-profile-menu">
                    <div class="profile-avatar-trigger" id="profileTrigger">
                        <div class="avatar-circle">${avatarChar}</div>
                    </div>
                    <div class="profile-dropdown-card" id="profileDropdown">
                        <div class="dropdown-header">
                            <h6>${name}</h6>
                            <span class="user-role-badge">${role.toUpperCase()} LEVEL</span>
                        </div>
                        <hr class="dropdown-divider">
                        <button class="dropdown-logout-btn" id="btnLogoutAction">
                            <i class="bi bi-box-arrow-left"></i> Log Out
                        </button>
                    </div>
                </div>
            `;

            if (desktopActions) desktopActions.innerHTML = dropdownMarkup;
            if (mobileActions) mobileActions.innerHTML = dropdownMarkup;

            // Handle user profile card trigger toggles
            setTimeout(() => {
                const trigger = document.getElementById("profileTrigger");
                const dropdown = document.getElementById("profileDropdown");
                if (trigger && dropdown) {
                    trigger.addEventListener("click", function (e) {
                        e.stopPropagation();
                        dropdown.classList.toggle("show");
                    });
                    document.addEventListener("click", () => dropdown.classList.remove("show"));
                }

                const logoutBtn = document.getElementById("btnLogoutAction");
                if (logoutBtn) {
                    logoutBtn.addEventListener("click", function () {
                        localStorage.clear();
                        window.location.href = "/signin";
                    });
                }
            }, 100);

        } else {
            const staticButtons = `
                <a href="/signin" class="btn-signin">Sign In</a>
                <a href="/signup" class="btn-signup">Sign Up</a>
            `;
            if (desktopActions) desktopActions.innerHTML = staticButtons;
            if (mobileActions) mobileActions.innerHTML = staticButtons;
        }

        // Handle mobile sidebar menu responsive drawer burger actions
        setTimeout(() => {
            const navToggle = document.getElementById('navToggle');
            const navMenuWrapper = document.getElementById('navMenuWrapper');
            if (navToggle && navMenuWrapper) {
                navToggle.addEventListener('click', function () {
                    navToggle.classList.toggle('active');
                    navMenuWrapper.classList.toggle('active');
                });
            }
        }, 100);
    })();
</script>
</html>
