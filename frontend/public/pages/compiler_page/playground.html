<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Compiler</title>
  <link rel="icon" type="image/png" href="/asset/magento-brands-solid-full.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/codemirror-5.65.21/lib/codemirror.css">
  <script src="/codemirror-5.65.21/lib/codemirror.js"></script>
  <script src="/codemirror-5.65.21/mode/clike/clike.js"></script>
  <link rel="stylesheet" href="/codemirror-5.65.21/theme/darcula.css">
  <link rel="stylesheet" href="/codemirror-5.65.21/theme/night.css">
  <script src="/codemirror-5.65.21/addon/edit/closebrackets.js"></script>
  <script src="/codemirror-5.65.21/mode/python/python.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/compiler_css/playground.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="landing-page d-flex flex-column" style="height: 100vh; overflow: hidden;">

  <!-- navbar start -->

  <!-- navbar end -->

  <div class="row gx-0 ide-workspace" style="height:calc(100vh - 64px)">
    <div class="col-12">
      <div class="row gx-0" style="height:100%">
        <div class="col-12 col-lg-6 d-flex">
          <div class="pane-card editor-pane d-flex flex-column w-100" style="height:100%">
            <div class="editor-header">
              <div class="custom-select-wrapper">
                <label class="visually-hidden" for="inlineFormSelectPref">Language</label>
                <select class="form-select custom-select" id="inlineFormSelectPref">
                  <option selected value="noL">Choose Language</option>
                  <option value="python">Python</option>
                  <option value="javascript">JavaScript</option>
                  <option value="cpp">C++</option>
                  <option value="c">C</option>
                  <option value="java">Java</option>
                </select>
              </div>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-success btn-action" id="coderun">
                  <i class="bi bi-play-fill"></i> Run Code
                </button>
              </div>
            </div>

            <div class="editor-body flex-grow-1" style="min-height:0">
              <textarea type="text" class="form-control h-100" id="editor"></textarea>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6 d-flex">
          <div class="pane-card console-pane d-flex flex-column w-100" style="height:100%">
            <div class="console-header">
              <span class="console-header-title"><i class="bi bi-terminal-fill me-2"></i>Console Output</span>
            </div>

            <div class="console-body flex-grow-1 d-flex flex-column" style="min-height:0">
              <textarea class="form-control flex-grow-1" id="output" readonly
                placeholder="Output will appear here after compiling..."></textarea>

              <div class="console-footer mt-2">
                <div class="console-stat">
                  <span>Execution Time:</span>
                  <span class="console-stat-value"><span id="execTime">-</span> ms</span>
                </div>
                <div class="console-stat">
                  <span>Estimated Complexity:</span>
                  <span class="console-stat-value" id="complexity">-</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

<script>
  var editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: "text/x-c++src",
    theme: "darcula",
    lineNumbers: true,
    autoCloseBrackets: true
  })

  // navbar toggle button for mobile device
  document.addEventListener('DOMContentLoaded', function () {
    const navToggle = document.getElementById('navToggle');
    const navMenuWrapper = document.getElementById('navMenuWrapper');

    if (navToggle && navMenuWrapper) {
      navToggle.addEventListener('click', function () {
        navToggle.classList.toggle('active');
        navMenuWrapper.classList.toggle('active');
      });
    }
  });
</script>
<script src="js/run_compiler/playgroundRun.js"></script>
<script src="js/language.js"></script>

</html>
