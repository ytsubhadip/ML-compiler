<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ML compiler</title>
    <link rel="icon" type="image/png" href="../asset/magento-brands-solid-full.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/auth_css/signin.css">
</head>

<body class="landing-page d-flex flex-column" style="min-height: 100vh; overflow-x: hidden;">
    <div class="starry-background-canvas">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>
    <main class="auth-wrapper">
        <div class="auth-container" style="position: relative; z-index: 10;">
            <a href="/" class="back-to-home-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
            
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fa-brands fa-magento brand-icon"></i>
                    <h2 id="authTitle">Join ML Compiler</h2>
                    <p id="authSubtitle">Create an account to track your progress and compete globally as a student.</p>
                </div>

                <div class="persona-selector-container" id="personaSelectorContainer">
                    <div class="persona-indicator" id="personaIndicator"></div>
                    <button class="persona-tab active" id="btnTabStudent" type="button">
                        <i class="bi bi-mortarboard-fill me-2"></i>Student
                    </button>
                    <button class="persona-tab" id="btnTabTeacher" type="button">
                        <i class="bi bi-person-workspace me-2"></i>Teacher
                    </button>
                </div>

                <div class="auth-form-wrapper">
                    <form class="auth-form" id="formSignup">
                        <div class="form-group">
                            <label for="signupName">Full Name</label>
                            <div class="input-wrapper">
                                <i class="bi bi-person-fill input-icon"></i>
                                <input class="input-control" type="text" id="signupName" required placeholder="full name">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signupEmail">Email Address</label>
                            <div class="input-wrapper">
                                <i class="bi bi-envelope-fill input-icon"></i>
                                <input class="input-control" type="email" id="signupEmail" required placeholder="name@domain.com">
                            </div>
                        </div>

                        <div class="form-group form-group-dynamic active" id="groupStudentId">
                            <label for="signupStudentId">Student Roll Number</label>
                            <div class="input-wrapper">
                                <i class="bi bi-card-list input-icon"></i>
                                <input class="input-control" type="text" id="signupStudentId" required placeholder="28940524021">
                            </div>
                        </div>
                        <div class="form-group form-group-dynamic" id="groupTeacherId">
                            <label for="signupTeacherId">Teacher Dept Code</label>
                            <div class="input-wrapper">
                                <i class="bi bi-briefcase-fill input-icon"></i>
                                <input class="input-control" type="text" id="signupTeacherId" placeholder="405">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock-fill input-icon"></i>
                                <input class="input-control password-input" type="password" id="signupPassword" required placeholder="••••••••">
                                <i class="bi bi-eye-slash-fill toggle-password" onclick="togglePasswordVisibility('signupPassword', this)"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signupConfirmPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="bi bi-shield-lock-fill input-icon"></i>
                                <input class="input-control password-input" type="password" id="signupConfirmPassword" required placeholder="••••••••">
                                <i class="bi bi-eye-slash-fill toggle-password" onclick="togglePasswordVisibility('signupConfirmPassword', this)"></i>
                            </div>
                        </div>

                        <button class="btn-auth-submit btn-signup-submit" type="submit" id="btnSubmitSignup">
                            <i class="bi bi-person-plus-fill me-1"></i> Create Account
                        </button>
                    </form>
                </div>

                <div class="auth-card-footer mt-4 text-center">
                    <p class="mb-0 text-white" style="font-size: 0.9rem;">
                        Already have an account? <a href="/signin" class="auth-redirect-link">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
    <script>
        const btnTabStudent = document.getElementById('btnTabStudent');
        const btnTabTeacher = document.getElementById('btnTabTeacher');
        const personaSelectorContainer = document.getElementById('personaSelectorContainer');
        const groupStudentId = document.getElementById('groupStudentId');
        const groupTeacherId = document.getElementById('groupTeacherId');
        const signupStudentId = document.getElementById('signupStudentId');
        const signupTeacherId = document.getElementById('signupTeacherId');
        const btnSubmitSignup = document.getElementById('btnSubmitSignup');
        const authSubtitle = document.getElementById('authSubtitle');

        let activeRole = 'student';

        function selectStudentRole() {
            btnTabStudent.classList.add('active');
            btnTabTeacher.classList.remove('active');
            personaSelectorContainer.classList.remove('teacher-active');
            groupStudentId.classList.add('active');
            groupTeacherId.classList.remove('active');
            signupStudentId.required = true;
            signupTeacherId.required = false;
            btnSubmitSignup.className = "btn-auth-submit btn-signup-submit";
            btnSubmitSignup.removeAttribute('style');
            activeRole = 'student';
            authSubtitle.innerText = "Create an account to track your progress and compete globally as a student.";
        }

        function selectTeacherRole() {
            btnTabStudent.classList.remove('active');
            btnTabTeacher.classList.add('active');
            personaSelectorContainer.classList.add('teacher-active');
            groupStudentId.classList.remove('active');
            groupTeacherId.classList.add('active');
            signupStudentId.required = false;
            signupTeacherId.required = true;
            btnSubmitSignup.style.backgroundColor = "#ffffff";
            btnSubmitSignup.style.borderColor = "#3b82f6";
            btnSubmitSignup.style.color = "#0d0f12";
            activeRole = 'teacher';
            authSubtitle.innerText = "Create an account to track your progress and compete globally as a teacher.";
        }

        btnTabStudent.addEventListener('click', selectStudentRole);
        btnTabTeacher.addEventListener('click', selectTeacherRole);

        function togglePasswordVisibility(inputId, toggleIcon) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput) {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('bi-eye-slash-fill');
                    toggleIcon.classList.add('bi-eye-fill');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('bi-eye-fill');
                    toggleIcon.classList.add('bi-eye-slash-fill');
                }
            }
        }
    </script>
    <script src="/js/pages/user_auth/signup.js"></script>
</body>

</html>
