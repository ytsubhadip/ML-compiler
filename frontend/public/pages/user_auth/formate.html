<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formate</title>
    <link rel="icon" type="image/png" href="../asset/magento-brands-solid-full.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/auth_css/signin.css">
    <link rel="stylesheet" href="css/animated-Element/button.css">

    <style>
        .button:hover i {
            animation: spin-reverse 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            from {
                transform: rotate(360deg);
            }

            to {
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body>
    <div class="starry-background-canvas">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>
    <main class="auth-wrapper">
        <div class="auth-container" style="position: relative; z-index: 10;">
            <a href="/" class="back-to-home-link"><i class="bi bi-arrow-left"></i> Back to Home</a>

            <div class="auth-card">
                <div class="auth-header">
                    <i class="fa-brands fa-magento brand-icon"></i>
                    <h2 id="authTitle">Forgot Password</h2>
                </div>

                <div class="auth-form-wrapper">
                    <form class="auth-form" id="formSignup">


                        <div class="form-group">
                            <label for="Email">Email Address</label>
                            <div class="input-wrapper">
                                <i class="bi bi-envelope-fill input-icon"></i>
                                <input class="input-control" type="email" id="Email" required
                                    placeholder="name@domain.com">
                            </div>
                        </div>


                        <div class="form-group">
                            <label for="Password">New Password</label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock-fill input-icon"></i>
                                <input class="input-control password-input" type="password" id="Password" required
                                    placeholder="••••••••">
                                <i class="bi bi-eye-slash-fill toggle-password"
                                    onclick="togglePasswordVisibility('Password', this)"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="ConfirmPassword">Re-Type New Password</label>
                            <div class="input-wrapper">
                                <i class="bi bi-shield-lock-fill input-icon"></i>
                                <input class="input-control password-input" type="password" id="ConfirmPassword"
                                    required placeholder="••••••••">
                                <i class="bi bi-eye-slash-fill toggle-password"
                                    onclick="togglePasswordVisibility('ConfirmPassword', this)"></i>
                            </div>
                        </div>

                        <div class="button-container">
                            <button class="button btn-auth-submit" type="submit" id="btnSubmitSignup"
                                aria-label="Submit small">
                                <i class="fa-solid fa-arrow-rotate-left  fa-spin-reverse"
                                    style="color: rgb(20, 20, 21);"></i>
                                &nbsp;&nbsp;
                                Reset&nbsp; Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
<script>
    function togglePasswordVisibility(inputId, toggleIcon) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput) {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye-slash-fill');
                toggleIcon.classList.add('bi-eye-fill');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-fill');
                toggleIcon.classList.add('bi-eye-slash-fill');
            }
        }
    }
</script>

</html>
