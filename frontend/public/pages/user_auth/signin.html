<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ML compiler</title>
    <link rel="icon" type="image/png" href="../asset/magento-brands-solid-full.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/auth_css/signin.css">
</head>

<body class="landing-page d-flex flex-column" style="min-height: 100vh; overflow-x: hidden;">
    <div class="starry-background-canvas">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>
    <main class="auth-wrapper">
        <div class="auth-container" style="position: relative; z-index: 10;">
            <a href="/" class="back-to-home-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
            
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fa-brands fa-magento brand-icon"></i>
                    <h2 id="authTitle">Welcome Back</h2>
                    <p id="authSubtitle">Log in to ML Compiler to compile and run your solutions as a student.</p>
                </div>

                <div class="persona-selector-container" id="personaSelectorContainer">
                    <div class="persona-indicator" id="personaIndicator"></div>

                    <button class="persona-tab active" id="btnTabStudent" type="button">
                        <i class="bi bi-mortarboard-fill me-2"></i>Student
                    </button>

                    <button class="persona-tab" id="btnTabTeacher" type="button">
                        <i class="bi bi-person-workspace me-2"></i>Teacher
                    </button>
                </div>

                <div class="auth-form-wrapper">
                    <form class="auth-form" id="formSignin">
                        <div class="form-group">
                            <label for="signinEmail">Email Address</label>
                            <div class="input-wrapper">
                                <i class="bi bi-envelope-fill input-icon"></i>
                                <input class="input-control" type="email" id="signinEmail" required placeholder="name@domain.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signinPassword">Password</label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock-fill input-icon"></i>
                                <input class="input-control password-input" type="password" id="signinPassword" required placeholder="••••••••">
                                <i class="bi bi-eye-slash-fill toggle-password" id="toggleSigninPassword"></i>
                            </div>
                        </div>

                        <div class="form-actions">
                            <a href="#" class="forgot-password">Forgot password?</a>
                        </div>

                        <button class="btn-auth-submit btn-signin-submit" type="submit" id="btnSubmitSignin">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>
                    </form>
                </div>

                <div class="auth-card-footer mt-4 text-center">
                    <p class="mb-0 text-white" style="font-size: 0.9rem;">
                        Don't have an account? <a href="/signup" class="auth-redirect-link">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
    
    <script src="/js/auth/signin.js"></script>
</body>

</html>
