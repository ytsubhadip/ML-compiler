<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Compiler</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="codemirror-5.65.21/lib/codemirror.css">
  <script src="codemirror-5.65.21/lib/codemirror.js"></script>
  <script src="codemirror-5.65.21/mode/clike/clike.js"></script>
  <!-- theme -->
  <link rel="stylesheet" href="codemirror-5.65.21/theme/darcula.css">
  <link rel="stylesheet" href="codemirror-5.65.21/theme/night.css">
  <script src="codemirror-5.65.21/addon/edit/closebrackets.js"></script>
  <script src="codemirror-5.65.21/mode/python/python.js"></script>

</head>

<body class="landing-page" style="background-color: #444;">

  <div class="row m-2">
    <div class="col">
      <div class="d-flex justify-content-between mb-2 bg-dark p-2 rounded">

        <div class="col-12 w-25">
          <label class="visually-hidden" for="inlineFormSelectPref">Preference</label>
          <select class="form-select" id="inlineFormSelectPref">
            <option selected>Choose Language</option>
            <option value="python">Python</option>
            <option value="CPP">C++</option>
            <option value="CPP">C</option>
            <option value="java">Java</option>
          </select>


        </div>
        <div>
          <button type="button" class="btn btn-success">Ml Compiler</button>
          <button type="button" class="btn btn-success" id="coderun"><i class="bi bi-play-fill"></i></button>
        </div>
      </div>
      <textarea type="text" class="form-control" id="editor"></textarea>
    </div>

    <div class="col d-flex flex-column rounded bg-dark px-4 ">
      <div class="h-50">
        <label for="input" class="text-light mt-4 mb-2">Input</label>
        <textarea type="text" class="form-control h-75" id="input"></textarea>
      </div>
      <div class="h-50">
        <label for="output" class="text-light mb-2">Output</label>
        <textarea type="text" class="form-control h-75" id="output"></textarea>
      </div>

    </div>
  </div>

</body>
<script>
  console.log("hello");

  var editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: "text/x-c++src",
    theme: "darcula",
    lineNumbers: true,
    autoCloseBrackets: true

  })
  var width = window.innerWidth
  editor.setSize(0.7 * width, "500")

 var optionL = document.getElementById('inlineFormSelectPref')
  optionL.addEventListener('change', function(e){
      console.log(optionL.value) 
      if(optionL.value == 'python'){
        editor.setOption("mode", "text/x-python")
      }
      else if(optionL.value =='CPP'){
        editor.setOption("mode", "text/x-c++src")
      }
      else if(optionL.value == 'C'){
        editor.setOption("mode", "text/x-csrc")
      }
      else if(optionL.value == 'java'){
        editor.setOption("mode", "text/x-java")
      }
  })
  var code
  document.getElementById("coderun").addEventListener('click', async function(e){
    const input = document.getElementById('input')
    const output = document.getElementById('output')
    code = {
      code : editor.getValue(),
      input: input.value,
      lang: optionL.value
    }
    var oData = await fetch("http://localhost:8000/compiler",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify(code)
    })
    var con = await oData.json()
    output.value = con.output


  }, false)

</script>

</html>
